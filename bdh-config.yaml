# BDH Graph Harness Configuration

# ---------------------------------------------------------------------------
# Single-vault mode (default — backward compatible)
# ---------------------------------------------------------------------------

# Vault
vault_path: ./wiki  # path to your Obsidian vault

# Optional federated Markdown sources. External sources are read-only by default.
# Paths are scanned recursively for *.md and can be narrowed with include/exclude.
# external_sources:
#   - id: projects
#     path: ~/Projects
#     include:
#       - bdh-graph-harness/**/*.md
#       - mlx-colibri/docs/**/*.md
#     exclude:
#       - "**/.git/**"
#       - "**/node_modules/**"
#       - "**/.venv/**"
#       - "**/build/**"
#       - "**/dist/**"
#     writable: false
#     # Optional reciprocal edge between the two project anchor documents.
#     counterparts:
#       - group_id: bdh-graph-harness
#         vault_path: projects/bdh-graph-harness/overview.md
#         external_path: bdh-graph-harness/README.md

# Ollama
ollama_url: http://127.0.0.1:11434
embedding_model: nomic-embed-text-v2-moe
llm_provider: openrouter       # ollama | openrouter
llm_model: openrouter/free      # auto-selects available free models
openrouter_url: https://openrouter.ai/api/v1/chat/completions
openrouter_key: ${OPENROUTER_API_KEY}  # read from env, or paste key directly
llm_temperature: 0.3
llm_max_ctx: 4096
llm_timeout: 300

# ChromaDB
chroma_path: .bdh-chroma
chroma_collection: notes

# ---------------------------------------------------------------------------
# Multi-vault mode (uncomment and adapt; remove vault_path above)
# ---------------------------------------------------------------------------
#
# # Optional: vault used when vault_id is not specified in the API request.
# default_vault: hermes
#
# # Shared ChromaDB directory. Each vault gets its own collection within it.
# # If omitted, each vault keeps its own .bdh-chroma relative to its path.
# chroma_path: ~/.bdh/chroma
#
# vaults:
#   - id: hermes            # URL-safe: ^[a-zA-Z0-9_-]+$  (required, unique)
#     name: Hermes          # Human-readable label
#     path: ~/Documents/Hermes    # Must exist at startup
#     # chroma_collection: vault_hermes_notes   # Default: vault_{id}_notes
#     neurogenesis_dir: wiki/concepts
#     graph_ignore:
#       - wiki/index
#       - wiki/log
#       - wiki/raw/*
#
#   - id: research
#     name: Research Vault
#     path: ~/Documents/Research
#     # chroma_collection: vault_research_notes
#     neurogenesis_dir: concepts
#
# API vault selection:
#   POST /api/query        → body: {"vault_id": "hermes", "query": "..."}
#   GET  /api/stats        → query param: ?vault_id=hermes
#   GET  /api/vaults       → lists all configured vaults
#
# CLI vault selection:
#   python -m bdh_graph_harness --vault-id hermes --stats
#   python -m bdh_graph_harness --list-vaults
#
# MCP vault selection (optional vault_id parameter on all tools):
#   query(question="...", vault_id="hermes")
#   stats(vault_id="hermes")

# ---------------------------------------------------------------------------
# Shared settings (apply to all vaults)
# ---------------------------------------------------------------------------

# Attention parameters
seed_count: 5          # top-k embedding matches as seeds
max_hop: 2             # graph traversal depth
active_threshold: 0.25 # min activation score
hub_dampening: true    # dampen high-degree hub nodes
hub_degree_threshold: 15
max_neighbors_per_hop: 10

# Integrate-and-Fire attention (Phase 4) — EXPERIMENTAL
# When true, uses iterative accumulation + per-neuron threshold firing
# instead of single-pass k-hop traversal. Requires more compute.
experimental_integrate_fire: false

# Hebbian learning
alpha: 0.7    # frequency weight
beta: 0.3     # recency weight
decay: 0.95   # decay factor per session for unused links
hebbian_min_score: 0.15  # min activation score to create a synapse (prevents spurious connections)

# Neurogenesis
neurogenesis_dir: concepts
neurogenesis_enabled: true
neurogenesis_source_edges_enabled: true # validated generated provenance edges

# API server
api_host: 0.0.0.0  # bind su tutte le interfacce (localhost + tailscale)
api_port: 8643

# Hybrid search (Phase 3.1)
# DISABLED by default — BM25 does not improve retrieval for Italian vaults.
# See benchmarks/BM25_ANALYSIS.md for full benchmark results and rationale.
# Enable only if your vault contains multilingual or English-heavy content
# where exact keyword matching adds value.
hybrid_search: false
hybrid_alpha: 0.7   # weight for vector similarity (only used if hybrid_search: true)
hybrid_beta: 0.3    # weight for BM25 keyword score (only used if hybrid_search: true)
bm25_k1: 1.5
bm25_b: 0.75

# Adaptive threshold (Phase 3.3)
adaptive_threshold: true
threshold_floor: 0.05

# Online plasticity (Phase 3.2)
online_plasticity: true
stream_enabled: true

# Node quality (Phase 3.5)
# Nodes with quality score below threshold are marked dormant and
# visually dimmed. Reactivated when a future query activates them strongly.
quality_threshold: 0.25           # below this → dormant
quality_reactivation_score: 0.50  # activation score to re-awaken
quality_prune_interval: 50        # re-evaluate every N queries

# Memory consolidation (Phase 4) — sleep-cycle graph maintenance
# Triggered via POST /api/consolidate or cron. NOT called during query cycle.
# Mirrors biological sleep consolidation: downscaling + pruning + re-evaluation.
consolidation_downscale_factor: 0.90    # global weight multiplier per cycle
consolidation_prune_weight_floor: 0.02  # delete synapses below this weight after downscaling
consolidation_weak_weight_threshold: 0.15 # weak-tail threshold; not online creation threshold
consolidation_weak_max_frequency: 1.0     # stale weak traces above this frequency survive
consolidation_weak_min_age_hours: 48      # fresh weak traces get a grace period
consolidation_dormant_persist_cycles: 3 # remove nodes dormant for N+ consolidation cycles
consolidation_prune_dormant_nodes: true # actually delete stale dormant nodes (not just hide)

# Phantom links — semantic similarity connections (created during consolidation)
phantom_links_enabled: true             # enable/disable phantom link generation
phantom_similarity_threshold: 0.65     # minimum cosine similarity to create a phantom link
phantom_max_per_node: 3                # max phantom links per node (prevents hub creation)
phantom_max_total: 100                 # hard cap on total phantom links per cycle

# Python executable (for ChromaDB dependency) — auto-detected if omitted
# python_exec: /path/to/venv/bin/python

# Graph ignore — fnmatch patterns to exclude nodes from the graph
# graph_ignore:
#   - ".bdh-*"          # exclude BDH operational files
#   - "templates/*"     # exclude template directories
#   - "graphify-out/*"  # exclude derived Graphify artifacts
