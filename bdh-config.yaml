# BDH Graph Harness Configuration

# Vault
vault_path: ./wiki  # path to your Obsidian vault

# Ollama
ollama_url: http://127.0.0.1:11434
embedding_model: nomic-embed-text-v2-moe
llm_provider: openrouter       # ollama | openrouter
llm_model: openrouter/free      # auto-selects available free models
openrouter_url: https://openrouter.ai/api/v1/chat/completions
openrouter_key: ${OPENROUTER_API_KEY}  # read from env, or paste key directly
llm_temperature: 0.3
llm_max_ctx: 4096
llm_timeout: 300

# ChromaDB
chroma_path: .bdh-chroma
chroma_collection: notes

# Attention parameters
seed_count: 5          # top-k embedding matches as seeds
max_hop: 2             # graph traversal depth
active_threshold: 0.25 # min activation score
hub_dampening: true    # dampen high-degree hub nodes
hub_degree_threshold: 15
max_neighbors_per_hop: 10

# Hebbian learning
alpha: 0.7    # frequency weight
beta: 0.3     # recency weight
decay: 0.95   # decay factor per session for unused links

# Neurogenesis
neurogenesis_dir: concepts
neurogenesis_enabled: true

# API server
api_host: 0.0.0.0  # bind su tutte le interfacce (localhost + tailscale)
api_port: 8643

# Hybrid search (Phase 3.1)
# DISABLED by default — BM25 does not improve retrieval for Italian vaults.
# See benchmarks/BM25_ANALYSIS.md for full benchmark results and rationale.
# Enable only if your vault contains multilingual or English-heavy content
# where exact keyword matching adds value.
hybrid_search: false
hybrid_alpha: 0.7   # weight for vector similarity (only used if hybrid_search: true)
hybrid_beta: 0.3    # weight for BM25 keyword score (only used if hybrid_search: true)
bm25_k1: 1.5
bm25_b: 0.75

# Adaptive threshold (Phase 3.3)
adaptive_threshold: true
threshold_floor: 0.05

# Online plasticity (Phase 3.2)
online_plasticity: true
stream_enabled: true

# Python executable (for ChromaDB dependency) — auto-detected if omitted
# python_exec: /path/to/venv/bin/python

# Graph ignore — fnmatch patterns to exclude nodes from the graph
# graph_ignore:
#   - ".bdh-*"          # exclude BDH operational files
#   - "templates/*"     # exclude template directories